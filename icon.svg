<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="ring1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="ring2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#48C774"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  
  <!-- Outer glow ring -->
  <circle cx="256" cy="240" r="155" fill="none" stroke="url(#ring1)" stroke-width="14" stroke-linecap="round" stroke-dasharray="680 300" opacity="0.9"/>
  
  <!-- Inner ring -->
  <circle cx="256" cy="240" r="125" fill="none" stroke="url(#ring2)" stroke-width="8" stroke-linecap="round" stroke-dasharray="500 290" opacity="0.7"/>
  
  <!-- Lightning bolt -->
  <path d="M275 140 L235 230 L270 230 L230 340 L300 210 L260 210 Z" fill="url(#bolt)" opacity="0.95"/>
  
  <!-- Small timer dots -->
  <circle cx="256" cy="85" r="5" fill="#FF6B6B" opacity="0.8"/>
  <circle cx="370" cy="170" r="4" fill="#8B5CF6" opacity="0.7"/>
  <circle cx="370" cy="310" r="4" fill="#48C774" opacity="0.7"/>
  <circle cx="256" cy="395" r="5" fill="#3B82F6" opacity="0.8"/>
  <circle cx="142" cy="310" r="4" fill="#F59E0B" opacity="0.7"/>
  <circle cx="142" cy="170" r="4" fill="#FF6B6B" opacity="0.7"/>
  
  <!-- FT text -->
  <text x="256" y="470" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#ffffff" opacity="0.95" letter-spacing="8">FT</text>
</svg>
