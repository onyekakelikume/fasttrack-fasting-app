<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="50%" stop-color="#C850C0"/>
      <stop offset="100%" stop-color="#7B2FF7"/>
    </linearGradient>
  </defs>
  <!-- Full background - no rounded corners, iOS adds them automatically -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Timer ring - thicker and more prominent -->
  <circle cx="256" cy="256" r="155" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="18"/>
  <path d="M256 101 A155 155 0 1 1 146.5 393" fill="none" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <!-- Lightning bolt - bigger and bolder -->
  <path d="M290 120 L210 270 H260 L222 392 L330 230 H272 Z" fill="white"/>
</svg>
